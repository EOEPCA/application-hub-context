      resources:
      - pods/exec
      verbs:
      - create
    subjects:
    - kind: ServiceAccount
      name: default
  - name: secret-patcher-role-binding
    persist: false
    role:
      api_groups:
      - ''
      name: secret-patcher-role
      resources:
      - secrets
      verbs:
      - create
      - delete
    subjects:
    - kind: ServiceAccount
      name: default
  - name: job-submitter-role-binding
    persist: false
    role:
      api_groups:
      - batch
      name: job-submitter-role
      resources:
      - jobs
      verbs:
      - create
      - delete
      - list
      - watch
      - get
    subjects:
    - kind: ServiceAccount
      name: default
  secret_mounts: []
  volumes:
  - access_modes:
    - ReadWriteMany
    claim_name: calrissian-claim
    name: calrissian-volume
    persist: false
    size: 25Gi
    storage_class: standard
    volume_mount:
      mount_path: /calrissian
      name: calrissian-volume
